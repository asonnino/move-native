name: Lint
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check PR title format
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # pin@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check formatting
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - name: Install taplo
        uses: taiki-e/install-action@70e00552f3196d9a4c7dde7c57ef4c4830d422dd # pin@v2.68.2
        with:
          tool: taplo@0.9.3
      - name: Install editorconfig-checker
        run: |
          url="https://github.com/editorconfig-checker/editorconfig-checker/releases/download/v3.8.0/ec-linux-amd64.tar.gz"
          curl -sSL "$url" | tar xz
          sudo install "$(find . -name ec-linux-amd64 -type f)" /usr/local/bin/editorconfig-checker
      - name: Check files against editorconfig
        run: editorconfig-checker
      - name: Check formatting of all TOML files
        run: taplo format --check
      - name: Install yamlfmt
        run: |
          url="https://github.com/google/yamlfmt/releases/download/v0.17.0/yamlfmt_0.17.0_Linux_x86_64.tar.gz"
          curl -sSL "$url" | tar xvz yamlfmt
      - name: Check formatting of all YAML files
        run: ./yamlfmt -lint

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check spelling
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - uses: crate-ci/typos@07d900b8fa1097806b8adb6391b0d3e0ac2fdea7 # pin@v1.39.0

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - name: Run ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck --severity=error {} +

  license-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check license headers
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - name: Install licensesnip
        uses: taiki-e/install-action@70e00552f3196d9a4c7dde7c57ef4c4830d422dd # pin@v2.68.2
        with:
          tool: licensesnip@1.7.0
      - run: licensesnip check

  check-all:
    name: Check if all lint jobs succeeded
    if: always()
    needs:
      - pr-title
      - formatting
      - typos
      - shellcheck
      - license-headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decide whether all needed jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # pin@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
