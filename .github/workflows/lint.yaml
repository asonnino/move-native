name: Lint
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check PR title format
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # pin@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check formatting
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
      - name: Install taplo
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # pin@v2.83.2
        with:
          tool: taplo@0.9.3
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # pin@v6.3.0
        with:
          python-version: "3.x"
      - name: Install and run editorconfig-checker
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install editorconfig-checker=="2.7.3"
          ec
      - name: Check formatting of all TOML files
        run: taplo format --check
      - name: Install yamlfmt
        run: |
          url="https://github.com/google/yamlfmt/releases/download/v0.17.0/yamlfmt_0.17.0_Linux_x86_64.tar.gz"
          curl -sSL "$url" | tar xvz yamlfmt
      - name: Check formatting of all YAML files
        run: ./yamlfmt -lint

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check spelling
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # pin@v1.48.0

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
      - name: Run ShellCheck
        run: find . -type f -name "*.sh" -exec shellcheck --severity=error {} +

  license-headers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Check license headers
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
      - name: Install licensesnip
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # pin@v2.83.2
        with:
          tool: licensesnip@1.7.0
      - run: licensesnip check

  check-all:
    name: Check if all lint jobs succeeded
    if: always()
    needs:
      - pr-title
      - formatting
      - typos
      - shellcheck
      - license-headers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decide whether all needed jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # pin@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
