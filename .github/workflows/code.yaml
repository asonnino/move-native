name: Code

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CLICOLOR_FORCE: 1
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short
  LLVM_SYS_181_PREFIX: /usr/lib/llvm-18

jobs:
  diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      isRust: ${{ steps.diff.outputs.isRust }}
      isTestConfig: ${{ steps.diff.outputs.isTestConfig }}
      isRelevantForRustTests: ${{ steps.diff.outputs.isRust == 'true' || steps.diff.outputs.isTestConfig == 'true' }}
      isRelevantForZkTests: ${{ steps.diff.outputs.isZk == 'true' || steps.diff.outputs.isTestConfig == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - name: Detect Changes
        uses: "./.github/actions/diffs"
        id: diff

  lint:
    name: Lint Rust code
    needs: diff
    if: ${{ needs.diff.outputs.isRust == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - uses: "./.github/actions/rust-setup"
      - name: Check formatting with rustfmt
        run: cargo fmt --all -- --check
      - name: Lint using clippy (including tests)
        run: cargo clippy --locked --all-features --tests --no-deps -- -D warnings

  test:
    name: Test Rust code
    needs: diff
    if: ${{ needs.diff.outputs.isRelevantForRustTests == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - uses: "./.github/actions/rust-setup"
      - name: Run tests
        run: cargo nextest run --locked --profile ci --no-tests=warn

  test-zk:
    name: Test zero-knowledge (release)
    needs: diff
    if: ${{ needs.diff.outputs.isRelevantForZkTests == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
      - uses: "./.github/actions/rust-setup"
      # The SP1 prover is unusably slow unoptimized, so build and test in release.
      - name: Lint zero-knowledge (clippy, release)
        run: cargo clippy --locked -p zero-knowledge --all-features --tests --release --no-deps -- -D warnings
      - name: Test zero-knowledge (release)
        run: cargo nextest run --locked -p zero-knowledge --profile ci --release --no-tests=warn

  check-all:
    name: Check if all code checks succeeded
    if: always()
    needs:
      - diff
      - lint
      - test
      - test-zk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decide whether all needed jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # pin@v1.2.2
        with:
          allowed-skips: ${{ toJSON(needs) }}
          jobs: ${{ toJSON(needs) }}
